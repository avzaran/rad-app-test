services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
      - VITE_USE_MOCK_API=false
      - VITE_AI_ENABLED=true
    depends_on:
      - backend

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - JWT_SECRET=dev-secret-change-me
      - STORAGE_BASE_URL=http://minio:9000
      - STORAGE_BUCKET_NAME=radassist-files
      - RATE_LIMIT_PER_MIN=300
      - AI_GATEWAY_URL=http://ai-gateway:8090
    depends_on:
      - postgres
      - minio

  ai-gateway:
    build:
      context: ../ai-gateway
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      - PORT=8090
      - PROVIDER_MODE=${PROVIDER_MODE:-mock}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}

  postgres:
    image: postgres:17-alpine
    container_name: radassist_postgres
    environment:
      POSTGRES_DB: radassist
      POSTGRES_USER: radassist
      POSTGRES_PASSWORD: radassist
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: radassist_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:8-alpine
    container_name: radassist_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  minio_data:

