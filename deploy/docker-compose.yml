services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_USE_MOCK_API: ${VITE_USE_MOCK_API:-false}
        VITE_AI_ENABLED: ${VITE_AI_ENABLED:-true}
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - COOKIE_SAMESITE=${COOKIE_SAMESITE:-lax}
      - STORAGE_BASE_URL=http://minio:9000
      - STORAGE_BUCKET_NAME=radassist-files
      - RATE_LIMIT_PER_MIN=300
      - AI_GATEWAY_URL=http://ai-gateway:8090
      - AI_GATEWAY_SHARED_SECRET=${AI_GATEWAY_SHARED_SECRET:-change-me-ai-gateway-secret}
      - KNOWLEDGE_DATABASE_URL=${KNOWLEDGE_DATABASE_URL:-postgres://radassist:change-me-in-local-dev@postgres:5432/radassist?sslmode=disable}
      - KNOWLEDGE_WORKER_POLL_MS=${KNOWLEDGE_WORKER_POLL_MS:-1500}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      ai-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  ai-gateway:
    build:
      context: ../ai-gateway
      dockerfile: Dockerfile
    environment:
      - PORT=8090
      - AI_GATEWAY_SHARED_SECRET=${AI_GATEWAY_SHARED_SECRET:-change-me-ai-gateway-secret}
      # Provider: "mock", "openai", "deepseek", or "gemini"
      - PROVIDER_MODE=${PROVIDER_MODE:-mock}
      # OpenAI config
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - LLM_COMPLETIONS_PATH=${LLM_COMPLETIONS_PATH:-/v1/chat/completions}
      # DeepSeek config
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      # Gemini config
      - GEMINI_BASE_URL=${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-flash}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8090/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:17-alpine
    container_name: radassist_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-radassist}
      POSTGRES_USER: ${POSTGRES_USER:-radassist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-local-dev}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-radassist} -d ${POSTGRES_DB:-radassist}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: radassist_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-in-local-dev}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:8-alpine
    container_name: radassist_redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
  minio_data:
